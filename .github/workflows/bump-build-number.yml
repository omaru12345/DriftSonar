name: Bump Build Number

# TASK-104: Automatically increment CURRENT_PROJECT_VERSION on every push to main.
# Uses agvtool to update the build number and commits it back.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  bump:
    name: Bump Build Number
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Bump build number with agvtool
        working-directory: DriftSonarApp/DriftSonarApp
        run: |
          xcrun agvtool next-version -all

      - name: Commit bumped build number
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DriftSonarApp/DriftSonarApp/DriftSonarApp.xcodeproj/project.pbxproj
          git commit -m "chore: bump build number [skip ci]" || echo "No changes to commit"
          git push
