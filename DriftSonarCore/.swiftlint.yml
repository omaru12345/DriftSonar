# DriftSonarCore — SwiftLint configuration (TASK-043)

# Rules that are disabled for this project
disabled_rules:
  - todo                  # Allow TODO comments for in-progress work
  - trailing_whitespace   # Handled by editor formatting

# Opt-in rules beyond the defaults
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - unavailable_function
  - unneeded_parentheses_in_closure_argument

# Thresholds
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

# Naming
type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - i
    - j
    - x
    - y

# Paths to exclude from linting
excluded:
  - .build
  - Tests
