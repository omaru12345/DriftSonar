<?xml version="1.0" encoding="UTF-8"?>
<!--
  DriftSonar アプリアイコン ベクター素材 (TASK-116)
  イルカ本体: Imagen 4 生成の AppIcon-1024.png を potrace でトレースした原本ベクター。
  ソナー波: パラメトリックな円弧3本（透明度減衰）で再構成。
  デザイン仕様: 白角丸背景 / 水色イルカ(跳ねるポーズ) / 鼻先からソナー波3本。
  色: dolphin #1AA7C0 (drift) / sonar arcs #40C8E0 (sonar)。色は <style> で一元管理。
  viewBox 1024x1024。イルカパスは potrace 座標系のため transform で正立させている。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="DriftSonar app icon: a water-blue dolphin emitting sonar waves">
  <style>
    .bg      { fill: #FFFFFF; }
    .dolphin { fill: #1AA7C0; }
    .wave    { fill: none; stroke: #40C8E0; stroke-width: 26; stroke-linecap: round; }
  </style>

  <!-- 白角丸背景（iOS の角丸はシステムに委ねるが、素材としてマスクを保持） -->
  <rect class="bg" x="0" y="0" width="1024" height="1024" rx="225" ry="225"/>

  <!-- イルカ本体（potrace トレース）。目は穴として抜けており背景の白が透けて目になる -->
