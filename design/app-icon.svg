  <!-- ソナー波 3本: 鼻先付近を中心に右へ開く円弧。外側ほど透過 -->
  <g class="wave">
    <path d="M 648 408 A 86 86 0 0 1 648 540"  opacity="0.95"/>
    <path d="M 700 376 A 138 138 0 0 1 700 572" opacity="0.65"/>
